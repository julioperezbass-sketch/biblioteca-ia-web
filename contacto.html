<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contacto</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        background: #1a1a1a;
        color: #fff;
        margin: 0;
      }

      main {
        margin: 0 auto;
        max-width: 680px;
        padding: 28px 18px 44px;
      }

      h1 {
        font-size: 32px;
        margin: 0 0 14px;
      }

      p {
        color: #d4d4d8;
        font-size: 17px;
        line-height: 1.55;
      }

      form {
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 8px;
        margin-top: 18px;
        padding: 18px;
      }

      label {
        color: #f4f4f5;
        display: block;
        font-size: 15px;
        font-weight: 800;
        margin: 14px 0 8px;
      }

      input,
      textarea {
        background: #1f1f1f;
        border: 1px solid #3a3a3a;
        border-radius: 8px;
        box-sizing: border-box;
        color: #fff;
        font: inherit;
        padding: 13px 12px;
        width: 100%;
      }

      textarea {
        min-height: 150px;
        resize: vertical;
      }

      button {
        background: #7c3aed;
        border: 0;
        border-radius: 8px;
        color: #fff;
        cursor: pointer;
        display: block;
        font-size: 18px;
        font-weight: 800;
        margin-top: 16px;
        padding: 15px 18px;
        width: 100%;
      }

      .note {
        color: #a1a1aa;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Contacto</h1>
      <p>
        Puedes escribir para pedir ayuda con la app, informar de un problema,
        compartir una sugerencia o consultar algo relacionado con el proyecto.
      </p>

      <form name="contacto" method="POST" data-netlify="true">
        <input type="hidden" name="form-name" value="contacto" />

        <label for="nombre">Nombre</label>
        <input id="nombre" name="nombre" autocomplete="name" required />

        <label for="email">Correo electrónico</label>
        <input id="email" name="email" type="email" autocomplete="email" required />

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="mensaje" required></textarea>

        <button type="submit">Enviar mensaje</button>
        <p class="note">
          Tu mensaje llegará al panel de formularios del proyecto en Netlify.
        </p>
      </form>
    </main>
  </body>
</html>
